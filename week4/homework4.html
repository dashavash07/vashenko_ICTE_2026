<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    </head>

    <body>
        <a-scene vr-mode-ui = "enabled: false" renderer = "logarithmicDeptBuffer: true" embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
          
            <a-marker preset="hiro"> 
              <a-box color = "red"animation="property:material.color; type: color; from: red; to: green; loop: true; dur: 10000">
              ></a-box>
            </a-marker>

            <a-marker preset="kanji"> 
              <a-entity rotation = "-90 0 0" gltf-model="../models/stuffed_sheep_toy_low_poly.glb"></a-entity>
            </a-marker>

            <a-marker type= "pattern" url="pattern-moon.patt"> 
              <a-sphere radius = "0.5" src = "../images/Moon.jpg"></a-sphere>
            </a-marker>

            <a-entity camera></a-entity>

        </a-scene>
    </body>


  </html>
