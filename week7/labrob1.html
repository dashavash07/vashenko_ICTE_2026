<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Криворізька міська рада у VR</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="brick-texture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/bricks/brick_diffuse.jpg">
      </a-assets>
      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#466d46"></a-plane>
      <a-entity position="0 0 0">
        <a-box position="0 2 0" width="20" height="4" depth="2.5" 
               src="#brick-texture" repeat="10 2"></a-box>
        <a-box position="-8.75 2 3.5" width="2.5" height="4" depth="5" 
               src="#brick-texture" repeat="1.5 2"></a-box>
        <a-box position="0 2 3.5" width="5" height="4" depth="5" 
               src="#brick-texture" repeat="3 2"></a-box>
        <a-box position="8.75 2 3.5" width="2.5" height="4" depth="5" 
               src="#brick-texture" repeat="1.5 2"></a-box>
      </a-entity>
      <a-entity animation="property: position; from: 0 2 12; to: 0 10 22; dur: 3000; easing: easeInOutQuad; loop: false">
        <a-entity camera look-controls wasd-controls></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
