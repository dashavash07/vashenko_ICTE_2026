<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Криворізька міська рада у MindAR</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="brick-texture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/bricks/brick_diffuse.jpg">
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity animation="property: position; from: 0 0 0; to: 0 0 -3; dur: 3000; easing: easeInOutQuad; loop: false">
          <a-entity scale="0.1 0.1 0.1" rotation="90 0 0" position="0 0 0">
            <a-box position="0 2 0" width="20" height="4" depth="2.5" 
                   src="#brick-texture" repeat="10 2"></a-box>
            <a-box position="-8.75 2 3.5" width="2.5" height="4" depth="5" 
                   src="#brick-texture" repeat="1.5 2"></a-box>
            <a-box position="0 2 3.5" width="5" height="4" depth="5" 
                   src="#brick-texture" repeat="3 2"></a-box>
            <a-box position="8.75 2 3.5" width="2.5" height="4" depth="5" 
                   src="#brick-texture" repeat="1.5 2"></a-box>       
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
